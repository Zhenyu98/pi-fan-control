<title id="t">ARX2 thermal predictor accuracy</title><desc id="d">One-step prediction tracks measured temperature with about 0.66 C mean absolute error on a held-out run, and rollout error grows gradually with the prediction horizon.</desc>
<rect width="960" height="640" fill="#ffffff"/>
<text x="36" y="40" font-size="24" font-weight="700" fill="#111827">Does the model actually predict? Yes — about 0.66°C one-step error</text>
<text x="36" y="66" font-size="14" fill="#4b5563">ARX2 predictor on a held-out randomized-stress run (250 samples, ~8 min) it was not fit on. Inputs: measured PWM and CPU load.</text>
